<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行记忆 ✈️</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #e6f4ff 0%, #fff9e6 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #ff6b9d; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #ff6b9d; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .tag { display: inline-block; padding: 4px 12px; background: #e3f2fd; color: #1976d2; border-radius: 12px; font-size: 0.8rem; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">✈️</div>
      <h1>旅行记忆</h1>
    </div>
    <div class="card">
      <h2>日本之旅（进行中）</h2>
      <p><strong>时间：</strong>2024年国庆</p>
      <p><strong>进展：</strong>同事搞定日本签证（3年多次），讨论机票价格变化，免签政策讨论</p>
      <span class="tag">计划中</span>
    </div>
    <div class="card">
      <h2>宜昌之旅</h2>
      <p>之前计划的短途旅行</p>
      <span class="tag">计划中</span>
    </div>
    <div class="card">
      <h2>溯溪活动</h2>
      <p>经常进行的户外活动，新新很喜欢参与。2024年早几天去过一次。</p>
      <span class="tag">经常活动</span>
    </div>
    <div class="card">
      <h2>其他旅行计划</h2>
      <p>讨论过去澳大利亚、新加坡，想去浏阳看烟花</p>
    </div>
  </div>
</body>
</html>
