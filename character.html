<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性格特征 ✨</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #e8eaf6 0%, #fce4ec 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #673ab7; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #673ab7; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .tag { display: inline-block; padding: 4px 12px; background: #e8eaf6; color: #673ab7; border-radius: 12px; font-size: 0.8rem; margin-right: 8px; }
    .badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; margin-right: 8px; }
    .badge-dad { background: #e3f2fd; color: #1976d2; }
    .badge-mom { background: #fce4ec; color: #c2185b; }
    .badge-baby { background: #fff3e0; color: #f57c00; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">✨</div>
      <h1>性格特征</h1>
    </div>
    <div class="card">
      <h2>👨 爸爸</h2>
      <p class="badge badge-dad">勤快</p>
      <p class="badge badge-dad">大方</p>
      <p class="badge badge-dad">体贴</p>
      <p class="badge badge-dad">工作狂</p>
      <p style="margin-top:10px;">勤快：大男子主义、主动做饭收拾洗碗<br>
      大方：给钱大方，旅游2万，家具电器4万<br>
      体贴：关心家人，经常转账<br>
      工作狂：常年在广州工作</p>
    </div>
    <div class="card">
      <h2>👩 妈妈</h2>
      <p class="badge badge-mom">独立</p>
      <p class="badge badge-mom">会过日子</p>
      <p class="badge badge-mom">爱宝宝</p>
      <p class="badge badge-mom">幽默</p>
      <p style="margin-top:10px;">独立：独自在老家带宝宝<br>
      会过日子：精打细算，记录开支<br>
      爱宝宝：时刻关注宝宝<br>
      幽默：常用emoji，表情丰富</p>
    </div>
    <div class="card">
      <h2>👶 新新</h2>
      <p class="badge badge-baby">话痨</p>
      <p class="badge badge-baby">聪明</p>
      <p class="badge badge-baby">调皮</p>
      <p class="badge badge-baby">黏人</p>
      <p style="margin-top:10px;">话痨：嘴巴不歇气，特别爱说话<br>
      聪明：记心好，会造句<br>
      调皮：故意假咳来"骗"咳嗽药<br>
      黏人：不要妈妈去上班</p>
    </div>
  </div>
</body>
</html>
