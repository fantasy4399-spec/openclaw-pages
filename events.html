<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭大事件 🎉</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #fff3e0 0%, #e8f5e9 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #ff9800; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #ff9800; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .tag { display: inline-block; padding: 4px 12px; background: #fff3e0; color: #ff9800; border-radius: 12px; font-size: 0.8rem; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">🎉</div>
      <h1>家庭大事件</h1>
    </div>
    <div class="card">
      <h2>🎓 宝宝上幼儿园</h2>
      <p>爸妈讨论宝宝上幼儿园有多"卷"</p>
      <span class="tag">2024</span>
    </div>
    <div class="card">
      <h2>📘 办护照</h2>
      <p>爸爸带新新去办了护照</p>
      <span class="tag">2024</span>
    </div>
    <div class="card">
      <h2>🎂 宝宝生日</h2>
      <p>讨论给宝宝在哪里庆祝生日</p>
      <span class="tag">2024</span>
    </div>
    <div class="card">
      <h2>✈️ 日本之旅</h2>
      <p>国庆去日本跨年，签证已搞定</p>
      <span class="tag">2024</span>
    </div>
    <div class="card">
      <h2>🏪 门店生意</h2>
      <p>十月持平，十一月亏1万，考虑撤店</p>
      <span class="tag">经济</span>
    </div>
    <div class="card">
      <h2>💊 全家感冒</h2>
      <p>全家轮番感冒（宝宝→阿姨→妈妈→爸爸）</p>
      <span class="tag">健康</span>
    </div>
  </div>
</body>
</html>
