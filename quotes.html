<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>童言无忌 💬</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #fff9e6 0%, #ffe4ec 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #ff6b9d; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #ff6b9d; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .quote { background: #fff9f0; border-left: 4px solid #ffa500; padding: 15px; border-radius: 0 10px 10px 0; margin: 10px 0; font-style: italic; color: #555; font-size: 1.1rem; }
    .tag { display: inline-block; padding: 4px 12px; background: #fce4ec; color: #c2185b; border-radius: 12px; font-size: 0.8rem; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">💬</div>
      <h1>童言无忌</h1>
    </div>
    <div class="card">
      <h2>关于喊人</h2>
      <p class="quote">"我喜欢的人我就喊，我不喜欢的人我就不喊"</p>
      <p>场景：在广场玩时，邻居老人家过来打招呼，让新新喊人</p>
      <span class="tag">经典</span>
    </div>
    <div class="card">
      <h2>关于生妹妹</h2>
      <p class="quote">"说他长大了，变得勇敢了，不需要照顾了"</p>
      <p>场景：妈妈说再生一个妹妹，新新说不需要照顾了</p>
      <span class="tag">可爱</span>
    </div>
    <div class="card">
      <h2>关于咳嗽</h2>
      <p class="quote">"宝宝也有点咳嗽"</p>
      <p>场景：看到阿姨买止咳糖浆，故意假咳几声，想吃药</p>
      <span class="tag">戏精</span>
    </div>
    <div class="card">
      <h2>造句能力</h2>
      <p class="quote">"一边吃橘子一边吃橙子"</p>
      <p>场景：早上起来找妈妈要吃的</p>
      <span class="tag">进步</span>
    </div>
    <div class="card">
      <h2>关于假哭</h2>
      <p class="quote">"假哭子"</p>
      <p>场景：被妈妈教训后假装哭，一分钟后自己说"假哭子"然后笑</p>
      <span class="tag">搞笑</span>
    </div>
    <div class="card">
      <h2>日常萌点</h2>
      <p>超爱说话、黏妈妈、会送殷勤、会察言观色</p>
    </div>
  </div>
</body>
</html>
