<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新新成长记 - 家庭回忆录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 40px 30px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
    }
    h1 {
      background: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }
    .intro {
      background: #fff9f0;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      text-align: left;
    }
    .intro h3 {
      color: #ff6b6b;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    .intro p {
      color: #555;
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .feature {
      background: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .feature-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .feature h4 {
      color: #333;
      margin-bottom: 5px;
    }
    .feature p {
      color: #888;
      font-size: 0.85rem;
    }
    .family {
      background: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .family h3 {
      color: #333;
      margin-bottom: 15px;
    }
    .members {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .member {
      text-align: center;
    }
    .member-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      border-radius: 50%;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .member-name {
      color: #555;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⭐</div>
      <h1>新新成长记</h1>
      <p class="subtitle">—— 家庭回忆录 ——</p>
      
      <div class="intro">
        <h3>👨‍👩‍👦 关于我们</h3>
        <p>新新成长记是一个专属于我们家庭的温暖记录，记录星星成长中的每一个珍贵瞬间。</p>
        <p>用科技留存爱与回忆，让每一刻都闪闪发光 ✨</p>
      </div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">✈️</div>
        <h4>旅行记忆</h4>
        <p>记录每一次家庭旅行的美好时光</p>
      </div>
      <div class="feature">
        <div class="feature-icon">💫</div>
        <h4>童言无忌</h4>
        <p>星星的经典语录和可爱瞬间</p>
      </div>
      <div class="feature">
        <div class="feature-icon">📈</div>
        <h4>成长记录</h4>
        <p>身高体重、第一次...成长里程碑</p>
      </div>
      <div class="feature">
        <div class="feature-icon">❤️</div>
        <h4>家庭 Moments</h4>
        <p>一家人的温馨时刻和难忘回忆</p>
      </div>
    </div>

    <div class="family">
      <h3>👨‍👩‍👦 家庭成员</h3>
      <div class="members">
        <div class="member">
          <div class="member-avatar">⭐</div>
          <div class="member-name">李星星</div>
        </div>
        <div class="member">
          <div class="member-avatar">👨</div>
          <div class="member-name">爸爸</div>
        </div>
        <div class="member">
          <div class="member-avatar">👩</div>
          <div class="member-name">妈妈</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>新新成长记 · 用爱记录每一天</p>
      <p>Created with ❤️</p>
    </div>
  </div>
</body>
</html>
