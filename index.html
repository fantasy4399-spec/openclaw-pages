<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新新成长记 🏠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #fff9e6 0%, #ffe4ec 50%, #e6f4ff 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .floating {
      position: fixed;
      font-size: 2rem;
      animation: float 3s ease-in-out infinite;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }
    .floating:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
    .floating:nth-child(2) { top: 20%; right: 8%; animation-delay: 1s; }
    .floating:nth-child(3) { top: 60%; left: 3%; animation-delay: 2s; }
    .floating:nth-child(4) { top: 80%; right: 5%; animation-delay: 0.5s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
    
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(255, 182, 193, 0.3);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    .hero::before { content: "🌈☁️🎈"; font-size: 3rem; position: absolute; top: 10px; left: 20px; opacity: 0.3; }
    .hero::after { content: "⭐🌸🚗"; font-size: 2.5rem; position: absolute; bottom: 10px; right: 20px; opacity: 0.3; }
    .hero h1 { font-size: 2.8rem; background: linear-gradient(135deg, #ff6b9d, #ffa500, #87ceeb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .hero p { color: #666; font-size: 1.1rem; }
    .family-badge { display: inline-flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 10px 20px; border-radius: 25px; font-size: 1rem; font-weight: 500; }
    .badge-dad { background: #e3f2fd; color: #1976d2; }
    .badge-mom { background: #fce4ec; color: #c2185b; }
    .badge-baby { background: #fff3e0; color: #f57c00; }
    
    .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .nav-card {
      background: white; border-radius: 20px; padding: 30px; text-decoration: none; color: inherit;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .nav-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4); }
    .nav-card::before { content: attr(data-icon); font-size: 2.5rem; position: absolute; top: 15px; right: 20px; opacity: 0.2; }
    .nav-card h2 { font-size: 1.4rem; margin-bottom: 10px; color: #333; }
    .nav-card p { color: #888; font-size: 0.95rem; }
    .nav-card .tag { display: inline-block; margin-top: 15px; padding: 5px 15px; background: #fff5f5; color: #ff6b9d; border-radius: 15px; font-size: 0.85rem; }
    
    .footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.9rem; }
    
    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .family-badge { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="floating">🎈</div>
  <div class="floating">⭐</div>
  <div class="floating">🌸</div>
  <div class="floating">🚗</div>
  
  <div class="container">
    <div class="hero">
      <h1>🏠 新新成长记</h1>
      <p>记录我们一家人的温馨时光</p>
      <div class="family-badge">
        <span class="badge badge-dad">👨 爸爸</span>
        <span class="badge badge-mom">👩 妈妈</span>
        <span class="badge badge-baby">👶 新新</span>
      </div>
    </div>
    
    <div class="nav-grid">
      <a href="travel.html" class="nav-card" data-icon="✈️">
        <h2>✈️ 旅行记忆</h2>
        <p>日本、宜昌、溯溪...每一次出行都值得纪念</p>
        <span class="tag">了解更多 →</span>
      </a>
      
      <a href="quotes.html" class="nav-card" data-icon="💬">
        <h2>💬 童言无忌</h2>
        <p>新新的经典语录，童言童语超可爱</p>
        <span class="tag">了解更多 →</span>
      </a>
      
      <a href="growth.html" class="nav-card" data-icon="📈">
        <h2>📈 成长记录</h2>
        <p>健康、语言、每一个成长的瞬间</p>
        <span class="tag">了解更多 →</span>
      </a>
      
      <a href="moments.html" class="nav-card" data-icon="❤️">
        <h2>❤️ 家庭 Moments</h2>
        <p>一家人的温馨日常</p>
        <span class="tag">了解更多 →</span>
      </a>
      
      <a href="events.html" class="nav-card" data-icon="🎉">
        <h2>🎉 家庭大事件</h2>
        <p>上幼儿园、办护照，过生日...重要时刻</p>
        <span class="tag">了解更多 →</span>
      </a>
      
      <a href="character.html" class="nav-card" data-icon="✨">
        <h2>✨ 性格特征</h2>
        <p>爸爸、妈妈、新新的性格特点</p>
        <span class="tag">了解更多 →</span>
      </a>
    </div>
    
    <div class="footer">
      <p>💕 新新成长记 | 记录每一天的幸福</p>
    </div>
  </div>
</body>
</html>
