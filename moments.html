<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭 Moments ❤️</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #fce4ec 0%, #e3f2fd 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #e91e63; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #e91e63; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .tag { display: inline-block; padding: 4px 12px; background: #fce4ec; color: #c2185b; border-radius: 12px; font-size: 0.8rem; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">❤️</div>
      <h1>家庭 Moments</h1>
    </div>
    <div class="card">
      <h2>👨‍👩‍👧 日常互动</h2>
      <p>妈妈和新新互相拍照、一起溯溪、一起吃烤肉、一起逛超市</p>
      <span class="tag">温馨</span>
    </div>
    <div class="card">
      <h2>🏠 分居两地</h2>
      <p>爸爸在广州上班，妈妈和新新在老家，经常视频联系</p>
      <span class="tag">日常</span>
    </div>
    <div class="card">
      <h2>💕 温馨时刻</h2>
      <p>宝宝怕妈妈一个人睡觉无聊，主动来找妈妈睡觉；妈妈生病，宝宝关心</p>
      <span class="tag">暖心</span>
    </div>
    <div class="card">
      <h2>💰 家庭经济</h2>
      <p>爸爸给妈妈：旅游2万 + 家具电器4万 + 化妆品3500</p>
      <p>门店生意：十月持平，十一月亏1万</p>
    </div>
    <div class="card">
      <h2>🗓️ 2024年春节</h2>
      <p>讨论去日本或澳大利亚，最终决定去日本</p>
    </div>
  </div>
</body>
</html>
