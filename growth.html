<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成长记录 📈</title>
  <style>
    body { font-family: "PingFang SC", sans-serif; background: linear-gradient(180deg, #e8f5e9 0%, #fff9e6 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #4caf50; font-size: 1.8rem; }
    .header .icon { font-size: 3rem; }
    .back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #4caf50; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    .card h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
    .card p { color: #666; line-height: 1.6; }
    .tag { display: inline-block; padding: 4px 12px; background: #e8f5e9; color: #4caf50; border-radius: 12px; font-size: 0.8rem; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← 返回首页</a>
    <div class="header">
      <div class="icon">📈</div>
      <h1>成长记录</h1>
    </div>
    <div class="card">
      <h2>🎓 上幼儿园</h2>
      <p>爸妈讨论宝宝上幼儿园有多"卷"</p>
      <span class="tag">里程碑</span>
    </div>
    <div class="card">
      <h2>📘 办护照</h2>
      <p>爸爸带新新去办了护照</p>
      <span class="tag">里程碑</span>
    </div>
    <div class="card">
      <h2>🎂 宝宝生日</h2>
      <p>讨论给宝宝在哪里庆祝生日</p>
      <span class="tag">里程碑</span>
    </div>
    <div class="card">
      <h2>💊 健康记录</h2>
      <p>感冒、湿疹、舌头起泡、嘴巴烂、咳嗽、耳朵耳屎</p>
      <span class="tag">健康</span>
    </div>
    <div class="card">
      <h2>🗣️ 语言能力</h2>
      <p>会用"一边...一边..."造句，会说"假哭子"</p>
      <span class="tag">成长</span>
    </div>
    <div class="card">
      <h2>🎮 日常技能</h2>
      <p>喜欢拍照、溯溪、玩车车、帮妈妈拖地</p>
    </div>
  </div>
</body>
</html>
