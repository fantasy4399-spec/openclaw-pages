<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌿 四季打野 - 春季篇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    /* 游戏容器 */
    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 40%, #5D8C3E 100%);
    }

    /* 顶部状态栏 */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      z-index: 100;
    }
    .season-tag {
      background: #4CAF50;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
    .stats {
      display: flex;
      gap: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.9);
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 场景区域 */
    .scene {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 装饰层 - 竹林 */
    .bamboo {
      position: absolute;
      font-size: 60px;
      opacity: 0.7;
    }

    /* 地面 */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30%;
      background: linear-gradient(180deg, #5D8C3E 0%, #3E5C2E 100%);
      border-radius: 50% 50% 0 0 / 20% 20% 0 0;
    }

    /* 蕨毛覆盖层 - 遮挡物品 */
    .fern-cover {
      position: absolute;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 5;
    }
    .fern-cover:hover { transform: scale(1.1); }
    .fern-cover::before {
      content: '🌿';
      filter: brightness(0.8);
    }

    /* 物品 - 蕨菜 */
    .fern {
      position: absolute;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 3;
    }
    .fern.small { font-size: 24px; }
    .fern.large { font-size: 40px; }
    .fern.hidden { opacity: 0; }
    .fern.found { 
      opacity: 0; 
      transform: scale(1.5); 
      transition: all 0.5s;
    }
    .fern::after {
      content: '🌱';
    }
    .fern.small::after { content: '🌿'; }
    .fern.large::after { content: '🌾'; }

    /* 物品 - 春笋 */
    .bamboo-shoot {
      position: absolute;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 3;
    }
    .bamboo-shoot.small { font-size: 28px; }
    .bamboo-shoot.large { font-size: 44px; }
    .bamboo-shoot.found {
      opacity: 0;
      transform: translateY(-50px);
      transition: all 0.5s;
    }
    .bamboo-shoot::after { content: '🎍'; }

    /* 玩家 */
    .player {
      position: absolute;
      font-size: 48px;
      transition: all 0.3s ease-out;
      z-index: 10;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
    }

    /* 点击特效 */
    .click-effect {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 3px solid #FFD700;
      border-radius: 50%;
      animation: ripple 0.6s ease-out;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes ripple {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    /* 底部操作栏 */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      display: flex;
      justify-content: space-around;
      background: linear-gradient(to top, rgba(93,64,55,0.95), rgba(93,64,55,0.8));
      z-index: 100;
    }
    .btn {
      padding: 12px 20px;
      background: #8D6E63;
      color: white;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:active { background: #6D4C41; }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      width: 85%;
      max-width: 350px;
      text-align: center;
      animation: popIn 0.3s;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-icon { font-size: 60px; margin-bottom: 10px; }
    .item-name {
      font-size: 24px;
      font-weight: bold;
      color: #2E7D32;
      margin-bottom: 8px;
    }
    .item-desc {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .knowledge-card {
      background: #E8F5E9;
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      margin-bottom: 20px;
    }
    .knowledge-title {
      font-weight: bold;
      color: #2E7D32;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .knowledge-content {
      color: #555;
      font-size: 13px;
      line-height: 1.5;
    }
    .btn-confirm {
      background: #4CAF50;
      color: white;
      padding: 14px 40px;
      border-radius: 25px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }
    .btn-confirm:active { background: #388E3C; }

    /* 提示 */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
    }
    .hint.show { opacity: 1; }

    /* 背包面板 */
    .backpack-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      z-index: 300;
    }
    .backpack-panel.show { display: block; }
    .backpack-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #F5F5DC;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .backpack-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .backpack-title { font-size: 18px; font-weight: bold; color: #5D4037; }
    .backpack-close {
      background: #8D6E63;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .inventory-slot {
      background: #D7CCC8;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      min-height: 70px;
    }
    .inventory-slot .icon { font-size: 28px; }
    .inventory-slot .count {
      font-size: 12px;
      color: #5D4037;
    }
    .inventory-slot .name {
      font-size: 10px;
      color: #8D6E63;
    }
  </style>
</head>
<body>
  <div id="game">
    <!-- 顶部状态栏 -->
    <div class="top-bar">
      <div class="season-tag">🌸 春季</div>
      <div class="stats">
        <div class="stat">🪙 <span id="coins">0</span></div>
        <div class="stat">🎒 <span id="bag">0</span>/10</div>
      </div>
    </div>

    <!-- 场景 -->
    <div class="scene" id="scene">
      <!-- 装饰 - 竹林 -->
      <div class="bamboo" style="left:5%;top:10%;">🎋</div>
      <div class="bamboo" style="left:15%;top:5%;">🎍</div>
      <div class="bamboo" style="left:80%;top:8%;">🎋</div>
      <div class="bamboo" style="left:88%;top:12%;">🎍</div>
      <div class="bamboo" style="left:45%;top:3%;">🎋</div>
      
      <!-- 地面 -->
      <div class="ground"></div>

      <!-- 物品和遮挡物由JS生成 -->
    </div>

    <!-- 玩家 -->
    <div class="player" id="player" style="left:50%;top:60%;">🧑‍🌾</div>

    <!-- 点击提示 -->
    <div class="hint" id="hint">点击搜索</div>

    <!-- 底部操作栏 -->
    <div class="bottom-bar">
      <button class="btn" onclick="openBackpack()">🎒 背包</button>
      <button class="btn" onclick="showToast('🛠️ 装备功能开发中')">🛠️ 装备</button>
      <button class="btn" onclick="showToast('🏆 成就功能开发中')">🏆 成就</button>
      <button class="btn" onclick="showToast('🗺️ 地图功能开发中')">🗺️ 地图</button>
    </div>

    <!-- 采摘成功弹窗 -->
    <div class="modal" id="successModal">
      <div class="modal-content">
        <div class="success-icon">🎉</div>
        <div class="item-name" id="modalItemName">蕨菜</div>
        <div class="item-desc" id="modalItemDesc">山野间的野生蕨菜</div>
        <div class="knowledge-card">
          <div class="knowledge-title">📚 知识卡片</div>
          <div class="knowledge-content" id="modalKnowledge">蕨菜富含膳食纤维...</div>
        </div>
        <button class="btn-confirm" onclick="closeModal()">继续采摘</button>
      </div>
    </div>

    <!-- 背包面板 -->
    <div class="backpack-panel" id="backpackPanel">
      <div class="backpack-content">
        <div class="backpack-header">
          <div class="backpack-title">🎒 背包</div>
          <button class="backpack-close" onclick="closeBackpack()">关闭</button>
        </div>
        <div class="inventory-grid" id="inventoryGrid">
          <!-- 物品槽位由JS生成 -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // 游戏数据
    const items = {
      fern: {
        id: 'fern',
        name: '蕨菜',
        emoji: '🌱',
        emojiSmall: '🌿',
        emojiLarge: '🌾',
        desc: '山野间的野生蕨菜，嫩芽卷曲如拳',
        knowledge: '蕨菜富含膳食纤维，但鲜食需焯水去苦味。春季采摘最佳，老了口感会变差。',
        value: 1
      },
      bamboo_shoot: {
        id: 'bamboo_shoot',
        emoji: '🎍',
        name: '春笋',
        desc: '春天冒出的竹笋，鲜嫩可口',
        knowledge: '春笋笋肉鲜嫩，富含膳食纤维，但消化不良者不宜多食。挖笋要趁早，太阳出来后就变老了。',
        value: 2
      }
    };

    // 游戏状态
    let gameState = {
      coins: 0,
      bag: 0,
      bagCapacity: 10,
      inventory: {},
      playerX: window.innerWidth / 2,
      playerY: window.innerHeight * 0.6
    };

    // 场景物品
    let sceneItems = [];
    let fernCovers = [];

    // 初始化游戏
    function initGame() {
      loadGame();
      createScene();
      updateUI();
      setupControls();
    }

    // 加载存档
    function loadGame() {
      const saved = localStorage.getItem('seasonalGame');
      if (saved) {
        gameState = JSON.parse(saved);
      }
    }

    // 保存存档
    function saveGame() {
      localStorage.setItem('seasonalGame', JSON.stringify(gameState));
    }

    // 创建场景
    function createScene() {
      const scene = document.getElementById('scene');
      
      // 生成蕨菜（被蕨毛覆盖）
      for (let i = 0; i < 8; i++) {
        const x = 50 + Math.random() * (window.innerWidth - 100);
        const y = window.innerHeight * 0.35 + Math.random() * (window.innerHeight * 0.35);
        const size = Math.random() > 0.4 ? 'medium' : 'small';
        
        // 创建蕨毛遮挡物
        const cover = document.createElement('div');
        cover.className = 'fern-cover';
        cover.style.left = (x - 15) + 'px';
        cover.style.top = (y - 15) + 'px';
        cover.dataset.itemId = `fern_${i}`;
        cover.onclick = (e) => {
          e.stopPropagation();
          uncoverFern(cover, `fern_${i}`);
        };
        scene.appendChild(cover);
        fernCovers.push(cover);

        // 创建蕨菜
        const fern = document.createElement('div');
        fern.className = `fern ${size} hidden`;
        fern.id = `fern_${i}`;
        fern.style.left = x + 'px';
        fern.style.top = y + 'px';
        fern.onclick = (e) => {
          e.stopPropagation();
          collectItem('fern', size);
        };
        scene.appendChild(fern);
        
        sceneItems.push({ id: `fern_${i}`, element: fern, type: 'fern', size, collected: false });
      }

      // 生成春笋
      for (let i = 0; i < 5; i++) {
        const x = 80 + Math.random() * (window.innerWidth - 160);
        const y = window.innerHeight * 0.55 + Math.random() * (window.innerHeight * 0.2);
        const size = Math.random() > 0.5 ? 'large' : 'medium';
        
        const shoot = document.createElement('div');
        shoot.className = `bamboo-shoot ${size}`;
        shoot.id = `shoot_${i}`;
        shoot.style.left = x + 'px';
        shoot.style.top = y + 'px';
        shoot.onclick = (e) => {
          e.stopPropagation();
          collectItem('bamboo_shoot', size);
        };
        scene.appendChild(shoot);
        
        sceneItems.push({ id: `shoot_${i}`, element: shoot, type: 'bamboo_shoot', size, collected: false });
      }
    }

    // 翻开蕨毛
    function uncoverFern(coverElement, itemId) {
      coverElement.style.transform = 'scale(0) rotate(180deg)';
      coverElement.style.opacity = '0';
      setTimeout(() => coverElement.remove(), 300);
      
      const item = sceneItems.find(i => i.id === itemId);
      if (item) {
        item.element.classList.remove('hidden');
      }
      
      showHint('发现蕨菜！');
    }

    // 采集物品
    function collectItem(itemType, size) {
      if (gameState.bag >= gameState.bagCapacity) {
        showHint('背包已满！');
        return;
      }

      const itemData = items[itemType];
      const value = size === 'large' ? itemData.value * 2 : itemData.value;
      
      // 更新状态
      gameState.bag++;
      gameState.coins += value;
      gameState.inventory[itemType] = (gameState.inventory[itemType] || 0) + 1;
      
      // 标记已采集
      const sceneItem = sceneItems.find(i => i.type === itemType && !i.collected);
      if (sceneItem) {
        sceneItem.collected = true;
        sceneItem.element.classList.add('found');
        setTimeout(() => sceneItem.element.style.display = 'none', 500);
      }

      // 保存
      saveGame();
      updateUI();

      // 显示弹窗
      showSuccessModal(itemData);
    }

    // 显示成功弹窗
    function showSuccessModal(itemData) {
      document.getElementById('modalItemName').textContent = itemData.name;
      document.getElementById('modalItemDesc').textContent = itemData.desc;
      document.getElementById('modalKnowledge').textContent = itemData.knowledge;
      document.getElementById('successModal').classList.add('show');
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('successModal').classList.remove('show');
    }

    // 更新UI
    function updateUI() {
      document.getElementById('coins').textContent = gameState.coins;
      document.getElementById('bag').textContent = gameState.bag;
    }

    // 设置控制
    function setupControls() {
      const scene = document.getElementById('scene');
      const player = document.getElementById('player');

      // 点击场景移动和搜索
      scene.addEventListener('click', (e) => {
        if (e.target.classList.contains('fern') || 
            e.target.classList.contains('bamboo-shoot') ||
            e.target.classList.contains('fern-cover')) return;

        const rect = scene.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // 移动玩家
        player.style.left = x + 'px';
        player.style.top = y + 'px';

        // 创建点击特效
        createClickEffect(e.clientX, e.clientY);

        // 搜索附近物品
        searchNearby(x, y);
      });
    }

    // 创建点击特效
    function createClickEffect(x, y) {
      const effect = document.createElement('div');
      effect.className = 'click-effect';
      effect.style.left = x + 'px';
      effect.style.top = y + 'px';
      document.body.appendChild(effect);
      setTimeout(() => effect.remove(), 600);
    }

    // 搜索附近物品
    function searchNearby(x, y) {
      let found = false;
      const radius = 80;

      for (const item of sceneItems) {
        if (item.collected) continue;
        if (item.element.classList.contains('hidden')) continue;

        const itemX = parseFloat(item.element.style.left);
        const itemY = parseFloat(item.element.style.top);
        const distance = Math.sqrt(Math.pow(x - itemX, 2) + Math.pow(y - itemY, 2));

        if (distance < radius) {
          // 自动采集
          collectItem(item.type, item.size);
          found = true;
          break;
        }
      }

      if (!found) {
        showHint('这里没有东西...');
      }
    }

    // 显示提示
    function showHint(text) {
      const hint = document.getElementById('hint');
      hint.textContent = text;
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 1500);
    }

    // 打开背包
    function openBackpack() {
      const grid = document.getElementById('inventoryGrid');
      grid.innerHTML = '';
      
      // 显示所有物品
      let slotIndex = 0;
      for (const [itemId, count] of Object.entries(gameState.inventory)) {
        const item = items[itemId];
        for (let c = 0; c < count; c++) {
          if (slotIndex >= gameState.bagCapacity) break;
          const slot = document.createElement('div');
          slot.className = 'inventory-slot';
          slot.innerHTML = `<div class="icon">${item.emoji}</div><div class="count">${count}</div><div class="name">${item.name}</div>`;
          grid.appendChild(slot);
          slotIndex++;
        }
      }
      
      // 填充空槽位
      for (let i = slotIndex; i < gameState.bagCapacity; i++) {
        const slot = document.createElement('div');
        slot.className = 'inventory-slot';
        grid.appendChild(slot);
      }

      document.getElementById('backpackPanel').classList.add('show');
    }

    // 关闭背包
    function closeBackpack() {
      document.getElementById('backpackPanel').classList.remove('show');
    }

    // 显示提示（按钮）
    function showToast(msg) {
      alert(msg);
    }

    // 启动游戏
    window.onload = initGame;
  </script>
</body>
</html>
